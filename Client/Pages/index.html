<!doctype html>
<html lang="he">
  <head>
    <meta charset="UTF-8" />
    <title>Steam Store - Catalog</title>
    <link rel="stylesheet" href="../CSS/style.css" />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="../Scripts/ajaxCalls.js"></script>
    <link
      rel="stylesheet"
      href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.datatables.net/responsive/2.5.0/css/responsive.dataTables.min.css"
    />

    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/responsive/2.5.0/js/dataTables.responsive.min.js"></script>

    <style></style>
  </head>
  <body>
    <div class="header">
      <h1>Steam Store</h1>
      <div class="main-menu">
        <a onclick="location.href = 'newGameForm.html'">Add / Edit game</a>
        <a onclick="location.href = 'Mygames.html'" style="cursor: pointer"
          >my games</a
        >

        <div id="userMenuSlot" class="user-dropdown" style="display: none">
          <button class="dropdown-btn" onclick="toggleMenu(event)">
            <span id="navUserName"></span> ▼
          </button>
          <div class="dropdown-content" id="myDropdown">
            <button id="editUser">⚙️ Edit Profile</button>
            <a href="#" onclick="logout()">🚪 Logout</a>
          </div>
        </div>

        <a
          id="guestLoginBtn"
          onclick="location.href = 'auth.html'"
          class="btn"
          style="cursor: pointer; display: none; background: #28a745"
          >התחברות / הרשמה</a
        >
      </div>
    </div>

    <div class="search-bar" style="text-align: center; margin-bottom: 20px">
      <label
        for="tagInput"
        style="
          color: white;
          font-size: 1.2em;
          margin-right: 10px;
          vertical-align: middle;
        "
        >Search with tags:</label
      >

      <div
        style="
          position: relative;
          display: inline-block;
          text-align: left;
          direction: ltr;
          vertical-align: middle;
        "
      >
        <input
          list="tagList"
          id="tagInput"
          placeholder="Select a tag to add..."
          style="
            padding: 10px;
            border-radius: 5px;
            width: 250px;
            box-sizing: border-box;
            margin: 0;
            text-align: left;
          "
          autocomplete="off"
        />
        <datalist id="tagList"></datalist>
      </div>

      <button
        id="searchTagsBtn"
        class="btn btn-steam"
        style="padding: 10px; margin-left: 10px; vertical-align: middle"
      >
        Search
      </button>
      <button
        id="clearTagBtn"
        class="btn"
        style="padding: 10px; margin-left: 5px; vertical-align: middle"
      >
        Clear All
      </button>

      <div
        id="selectedTagsContainer"
        style="
          margin-top: 15px;
          display: flex;
          gap: 10px;
          justify-content: center;
          flex-wrap: wrap;
        "
      ></div>
    </div>

    <datalist id="tagList"></datalist>
    <div class="view-toggle">
      <button
        id="toggleViewBtn"
        class="btn"
        style="background-color: var(--accent-color)"
      >
        Switch to Table View
      </button>
    </div>

    <div id="catalog" class="games-grid"></div>

    <div id="tableContainer">
      <table id="gamesTable" class="display" style="width: 100%">
        <thead>
          <tr>
            <th>Image</th>
            <th>Name</th>
            <th>Release Date</th>
            <th>Price ($)</th>
            <th>Review Summary</th>
            <th>Platforms</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <div id="registerModal" class="modal-overlay">
      <div class="modal-content">
        <span class="close-btn">&times;</span>
        <h2 style="text-align: center; margin-top: 0">Edit Account</h2>
        <form id="popupRegisterForm" novalidate>
          <div class="form-group">
            <label for="popName">Name</label>
            <input type="text" id="popName" required />
            <div
              id="err-popName"
              class="field-error-msg"
              style="
                display: none;
                color: #ff4d4d;
                font-size: 12px;
                margin-top: 5px;
              "
            >
              Name must contain at least 2 characters (letters only).
            </div>
          </div>
          <div class="form-group">
            <label>New Password</label>
            <input type="password" id="popPassword" required />
            <div
              id="err-popPass"
              class="field-error-msg"
              style="
                display: none;
                color: #ff4d4d;
                font-size: 12px;
                margin-top: 5px;
              "
            >
              Password must be at least 8 characters, include 1 uppercase and 1
              number.
            </div>
          </div>
          <button type="submit" class="btn" style="margin-top: 15px">
            Update Profile
          </button>
        </form>
      </div>
    </div>

    <script>
      var loggedInUser = localStorage.getItem("loggedInUser");
      var loggedInUserId = localStorage.getItem("loggedInUserId");

      let allGamesData = []; // שומר את כל המשחקים בזיכרון לעריכה
      let isTableView = false;
      let dataTableInstance = null;

      // --- משתנים חדשים לניהול סינון מרובה תגיות ---
      let selectedTags = [];
      let allAvailableTags = [];

      // --- מערכת טעינה אוטומטית (Global Ajax Loader) ---
      $(document).ajaxStart(function () {
        $("#loadingOverlay").css("display", "flex").hide().fadeIn(200);
      });

      $(document).ajaxStop(function () {
        $("#loadingOverlay").fadeOut(200);
      });

      function toggleMenu(event) {
        event.stopPropagation();
        document.getElementById("myDropdown").classList.toggle("show");
      }

      window.onclick = function (event) {
        if (
          !event.target.matches(".dropdown-btn") &&
          !event.target.matches(".dropdown-btn *")
        ) {
          var dropdowns = document.getElementsByClassName("dropdown-content");
          for (var i = 0; i < dropdowns.length; i++) {
            if (dropdowns[i].classList.contains("show")) {
              dropdowns[i].classList.remove("show");
            }
          }
        }
      };

      $(document).ready(function () {
        const userMenuSlot = document.getElementById("userMenuSlot");
        const navUserName = document.getElementById("navUserName");
        const guestLoginBtn = document.getElementById("guestLoginBtn");

        if (loggedInUser) {
          navUserName.innerText = `Hello, ${loggedInUser}`;
          userMenuSlot.style.display = "inline-block";
          guestLoginBtn.style.display = "none";
        } else {
          userMenuSlot.style.display = "none";
          guestLoginBtn.style.display = "inline-block";
        }

        fetchCatalog();
        fetchTags(); // קריאה לשרת מיד בטעינת הדף (דרישת מטלה)

        // החלפת תצוגות (Toggle)
        $("#toggleViewBtn").click(function () {
          isTableView = !isTableView;
          if (isTableView) {
            $("#catalog").hide();
            $("#tableContainer").fadeIn();
            $(this).text("Switch to Card View");
          } else {
            $("#tableContainer").hide();
            $("#catalog").fadeIn();
            $(this).text("Switch to Table View");
          }
        });

        // --- לוגיקת בחירת תגיות (Chips) ---
        $("#tagInput").on("input", function () {
          const val = $(this).val().trim();

          if (
            val &&
            allAvailableTags.includes(val) &&
            !selectedTags.includes(val)
          ) {
            selectedTags.push(val);
            renderSelectedTags();
            $(this).val("");
          }
        });

        // --- כפתור חיפוש לפי תגיות ---
        $("#searchTagsBtn").click(function () {
          if (selectedTags.length === 0) {
            alert("Please select at least one tag first!");
            return;
          }

          const tagsQuery = selectedTags.join(",");
          ajaxCall(
            "GET",
            `/api/Games/GetByTags?tags=${encodeURIComponent(tagsQuery)}`,
            "",
            handleGamesData,
            error,
          );
        });

        // --- כפתור ניקוי תגיות ---
        $("#clearTagBtn").click(function () {
          selectedTags = [];
          renderSelectedTags();
          $("#tagInput").val("");
          fetchCatalog(); // מאפסים חזרה את כל הקטלוג
        });
      });

      // --- פונקציות עזר לתגיות ---
      function renderSelectedTags() {
        const container = $("#selectedTagsContainer").empty();
        selectedTags.forEach((tag) => {
          const chip = $(`
            <span class="tag-chip">
              ${tag} <span class="remove-tag" data-tag="${tag}">✖</span>
            </span>`);
          container.append(chip);
        });
      }

      $(document).on("click", ".remove-tag", function () {
        const tagToRemove = $(this).data("tag");
        // 1. הסרת התגית מהמערך וציור מחדש
        selectedTags = selectedTags.filter((t) => t !== tagToRemove);
        renderSelectedTags();

        // 2. עדכון אוטומטי של הקטלוג/טבלה
        if (selectedTags.length === 0) {
          // אם נמחקה התגית האחרונה - מחזירים את הקטלוג המלא
          fetchCatalog();
        } else {
          // אם נשארו תגיות - עושים חיפוש מחדש רק איתן
          const tagsQuery = selectedTags.join(",");
          ajaxCall(
            "GET",
            `/api/Games/GetByTags?tags=${encodeURIComponent(tagsQuery)}`,
            "",
            handleGamesData,
            error,
          );
        }
      });

      // פונקציית עזר לסידור תאריך
      function formatDate(dateStr) {
        if (!dateStr) return "N/A";
        const d = new Date(dateStr);
        if (isNaN(d)) return dateStr.split(" ")[0] || "N/A";
        return d.toLocaleDateString("en-US", {
          month: "short",
          day: "numeric",
          year: "numeric",
        });
      }

      function fetchCatalog() {
        ajaxCall("GET", "/api/Games", "", handleGamesData, error);
      }

      function fetchTags() {
        ajaxCall(
          "GET",
          "/api/Games/GetAllTags",
          "",
          function (tags) {
            allAvailableTags = tags; // שומרים את כל התגיות החוקיות
            let dataList = $("#tagList");
            dataList.empty();
            tags.forEach((t) =>
              dataList.append(`<option value="${t}"></option>`),
            );
          },
          error,
        );
      }

      function handleGamesData(games) {
        allGamesData = games;
        renderCatalog(games);
        renderTable(games);
      }

      function error(err) {
        console.error("שגיאה בשרת:", err);
      }

      // --- רינדור כרטיסיות (התצוגה הרגילה) ---
      function renderCatalog(games) {
        const container = $("#catalog").empty();

        games.forEach((g) => {
          let platformsHtml = "";
          if (g.windows)
            platformsHtml += `<span class="platform-tag">Windows</span>`;
          if (g.mac) platformsHtml += `<span class="platform-tag">Mac</span>`;
          if (g.linux)
            platformsHtml += `<span class="platform-tag">Linux</span>`;

          // --- לוגיקה חכמה לבחירת 3 התגיות שיוצגו ---
          let tagsToDisplay = [];
          if (g.tags && g.tags.length > 0) {
            // מפרידים בין התגיות שסוננו לבין שאר התגיות של המשחק
            const matchedTags = g.tags.filter((t) => selectedTags.includes(t));
            const otherTags = g.tags.filter((t) => !selectedTags.includes(t));

            // מחברים את הרשימות כשהתגיות שסוננו ראשונות, וחותכים ל-3
            tagsToDisplay = matchedTags.concat(otherTags).slice(0, 3);
          }

          const card = $(`
            <div class="game-card">
              <img src="${g.image || g.capsuleImage}" alt="${g.name}" />
              <div class="card-content">
                <h3>${g.name}</h3>
                <div class="meta-info">
                  <span>Price: ${g.price === 0 ? "free" : g.price + "$"}</span>
                  <span>Reviews: ${g.reviewSummary}</span>
                </div>
                <div class="platform-tags">${platformsHtml}</div>
                <div class="tags">
                  ${tagsToDisplay.map((t) => `<span class="tag">${t}</span>`).join("")}
                </div>
                <button class="btn btn-add">Add to library</button>
                <a href="${g.steamUrl}" target="_blank" class="btn btn-steam">Open on steam store</a>
                <span style="font-size: 15px; display: block; margin-top: 10px;">Release date: ${formatDate(g.releaseDate)}</span>
              </div>
            </div>
          `);

          card.find(".btn-add").click(function () {
            if (!loggedInUserId) window.location.href = "auth.html";
            else {
              ajaxCall(
                "POST",
                `/api/Users/AddGameToCollection?userId=${loggedInUserId}&gameId=${g.id}`, // שים לב: בטבלה המשתנה הוא gameId ולא g.id
                "",
                function (res) {
                  // תגובת 200 (הצלחנו)
                  alert("✅ " + (res || "המשחק נוסף בהצלחה לספרייה!"));
                },
                function (err) {
                  // תגובת 409 (Conflict - המשחק כבר קיים)
                  if (err.status === 409) {
                    alert(
                      "❌ שגיאה: " +
                        (err.responseText || "המשחק כבר קיים בספרייה שלך"),
                    );
                  } else {
                    // תגובת 500 (שגיאת שרת כללית) או שגיאה אחרת
                    let errorMsg = "אירעה שגיאה בשרת.";
                    if (err.responseText && !err.responseText.startsWith("<")) {
                      errorMsg = err.responseText;
                    }
                    alert("❌ תקלה: " + errorMsg);
                  }
                },
              );
            }
          });
          container.append(card);
        });
      }

      // --- רינדור טבלת ה-DataTables ---
      function renderTable(games) {
        if (dataTableInstance) {
          dataTableInstance.destroy(); // מנקים טבלה קודמת אם קיימת
        }

        const tbody = $("#gamesTable tbody").empty();

        games.forEach((g) => {
          let platformsHtml = "";
          if (g.windows) platformsHtml += "Win ";
          if (g.mac) platformsHtml += "Mac ";
          if (g.linux) platformsHtml += "Lin";

          // חישוב צבע הדרגתי לפי ציון (Gradient Tone)
          let rowColor = "";
          let reviewVal = parseFloat(g.reviewSummary);
          if (!isNaN(reviewVal)) {
            let hue = (reviewVal / 100) * 120;
            rowColor = `background-color: hsl(${hue}, 80%, 85%); color: #171a21;`;
          }

          const tr = $(`<tr style="${rowColor}">
                <td><img src="${g.image || g.capsuleImage}" style="width: 80px; border-radius: 5px;"></td>
                <td style="font-weight: bold;">${g.name}</td>
                <td>${formatDate(g.releaseDate)}</td>
                <td>
                    <input type="number" class="price-input" data-id="${g.id}" value="${g.price}" min="0">
                    <button class="btn-update-price" data-id="${g.id}">Update</button>
                </td>
                <td>${g.reviewSummary || "N/A"}</td>
                <td>${platformsHtml}</td>
                <td>
                    <button class="btn btn-add-table" data-id="${g.id}" style="background-color: #66c0f4; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer;">Add</button>
                </td>
            </tr>`);

          // הוספה לאוסף מתוך הטבלה
          tr.find(".btn-add-table").click(function () {
            const gameId = $(this).data("id");
            if (!loggedInUserId) window.location.href = "auth.html";
            else {
              ajaxCall(
                "POST",
                `/api/Users/AddGameToCollection?userId=${loggedInUserId}&gameId=${g.id}`, // שים לב: בטבלה המשתנה הוא gameId ולא g.id
                "",
                function (res) {
                  // תגובת 200 (הצלחנו)
                  alert("✅ " + (res || "המשחק נוסף בהצלחה לספרייה!"));
                },
                function (err) {
                  // תגובת 409 (Conflict - המשחק כבר קיים)
                  if (err.status === 409) {
                    alert(
                      "❌ שגיאה: " +
                        (err.responseText || "המשחק כבר קיים בספרייה שלך"),
                    );
                  } else {
                    // תגובת 500 (שגיאת שרת כללית) או שגיאה אחרת
                    let errorMsg = "אירעה שגיאה בשרת.";
                    if (err.responseText && !err.responseText.startsWith("<")) {
                      errorMsg = err.responseText;
                    }
                    alert("❌ תקלה: " + errorMsg);
                  }
                },
              );
            }
          });

          // --- הלוגיקה המקורית של לחיצה על כפתור העדכון ---
          tr.find(".btn-update-price").click(function () {
            const gameId = $(this).data("id");
            const newPrice = $(this).siblings(".price-input").val();

            const gameObj = allGamesData.find((game) => game.id === gameId);
            if (gameObj) {
              gameObj.price = parseFloat(newPrice);
              // שליחת ה-PUT לשרת
              ajaxCall(
                "PUT",
                `/api/games/${gameId}`,
                JSON.stringify(gameObj),
                function (res) {
                  alert("✅ Price updated successfully!");
                  fetchCatalog(); // רענון כדי שהמחיר יתעדכן גם בכרטיסיות
                },
                function (err) {
                  alert("❌ Failed to update price: " + err.responseText);
                },
              );
            }
          });

          tbody.append(tr);
        });

        // אתחול סופי של הטבלה החכמה
        dataTableInstance = $("#gamesTable").DataTable({
          pageLength: 5,
          lengthMenu: [5, 10, 25, 50],
          responsive: true,
        });
      }

      function logout() {
        localStorage.removeItem("loggedInUser");
        localStorage.removeItem("loggedInUserId");
        window.location.href = "auth.html";
      }

      // --- קוד הפופ-אפ (Edit Profile) עם ולידציות מלאות ---
      $(document).ready(function () {
        $("#editUser").click(function (e) {
          e.preventDefault();
          $("#popName").val(localStorage.getItem("loggedInUser"));
          $("#popPassword").val("");
          $(".field-error-msg").hide();
          $("input").removeClass("input-error");

          $("#registerModal").css("display", "flex").hide().fadeIn("fast");
        });

        $(".close-btn").click(function () {
          $("#registerModal").fadeOut("fast", function () {
            $("#popupRegisterForm").trigger("reset");
          });
        });

        $("#registerModal").click(function (e) {
          if ($(e.target).is("#registerModal")) {
            $("#registerModal").fadeOut("fast", function () {
              $("#popupRegisterForm").trigger("reset");
            });
          }
        });

        $("#popupRegisterForm").on("submit", function (e) {
          e.preventDefault();

          let isValid = true;
          const nameVal = $("#popName").val().trim();
          const passVal = $("#popPassword").val().trim();

          const nameRegex = /^[a-zA-Zא-ת\s]{2,}$/;
          const passRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)[a-zA-Z\d\W]{8,}$/;

          $("#popName, #popPassword").removeClass("input-error");
          $("#err-popName, #err-popPass").hide();

          if (!nameRegex.test(nameVal)) {
            $("#popName").addClass("input-error");
            $("#err-popName").show();
            isValid = false;
          }

          if (!passRegex.test(passVal)) {
            $("#popPassword").addClass("input-error");
            $("#err-popPass").show();
            isValid = false;
          }

          if (!isValid) return;

          const userObj = {
            id: parseInt(loggedInUserId),
            name: nameVal,
            password: passVal,
          };

          ajaxCall(
            "PUT",
            `/api/Users/${loggedInUserId}`,
            JSON.stringify(userObj),
            function (res) {
              alert("✅ Profile updated successfully!");

              localStorage.setItem("loggedInUser", nameVal);
              loggedInUser = nameVal;

              $("#navUserName").text(`Hello, ${nameVal}`);

              $("#registerModal").fadeOut("fast", function () {
                $("#popupRegisterForm").trigger("reset");
              });
            },
            function (err) {
              alert(
                "❌ Failed to update profile: " +
                  (err.responseText || "Server error"),
              );
            },
          );
        });
      });
    </script>
  </body>
</html>
