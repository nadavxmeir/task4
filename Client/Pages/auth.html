<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Steam Library - Authentication</title>
    <link rel="stylesheet" href="../CSS/formStyle.css" />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="../Scripts/ajaxCalls.js"></script>
  </head>
  <body>
    <div class="auth-container">
      <div id="serverError" class="server-error"></div>

      <div id="loginSection" class="form-section active">
        <div class="auth-header">
          <h2>Sign In</h2>
        </div>
        <form id="loginForm">
          <div class="form-group">
            <label for="loginEmail">Email Address</label>
            <input type="email" id="loginEmail" required />
          </div>
          <div class="form-group">
            <label for="loginPassword">Password</label>
            <input type="password" id="loginPassword" required />
          </div>
          <button type="submit" class="btn">Login</button>
        </form>
        <div class="switch-link">
          Don't have an account?
          <a onclick="toggleForms('register')">Register new user</a>
        </div>
      </div>

      <div id="registerSection" class="form-section">
        <div class="auth-header">
          <h2>Create Account</h2>
        </div>
        <form id="registerForm">
          <div class="form-group">
            <label for="regName">Name (Letters only, min 2 chars)</label>
            <input type="text" id="regName" required />
            <div id="nameError" class="error-message">
              Name must contain only letters and be at least 2 characters long.
            </div>
          </div>
          <div class="form-group">
            <label for="regEmail">Email Address</label>
            <input type="email" id="regEmail" required />
          </div>
          <div class="form-group">
            <label for="regPassword"
              >Password (Min 8 chars, 1 uppercase, 1 number)</label
            >
            <input type="password" id="regPassword" required />
            <div id="passwordError" class="error-message">
              Password must be at least 8 characters with 1 uppercase letter and
              1 number.
            </div>
          </div>
          <button type="submit" class="btn">Register</button>
        </form>
        <div class="switch-link">
          Already registered? <a onclick="toggleForms('login')">Sign in here</a>
        </div>
      </div>
    </div>

    <script>
      function toggleForms(target) {
        $(".server-error").hide();
        $(".error-message").hide();
        $("form").trigger("reset");

        if (target === "register") {
          $("#loginSection").removeClass("active");
          $("#registerSection").addClass("active");
        } else {
          $("#registerSection").removeClass("active");
          $("#loginSection").addClass("active");
        }
      }

      $(document).ready(function () {
        $("#registerForm").on("submit", function (e) {
          e.preventDefault();
          $(".error-message").hide();
          $(".server-error").hide();

          const name = $("#regName").val().trim();
          const email = $("#regEmail").val().trim();
          const password = $("#regPassword").val();

          let isValid = true;

          const nameRegex = /^[a-zA-Zא-ת\s]{2,}$/;
          if (!nameRegex.test(name)) {
            $("#nameError").show();
            isValid = false;
          }

          const passwordRegex = /^(?=.*[A-Z])(?=.*\d).{8,}$/;
          if (!passwordRegex.test(password)) {
            $("#passwordError").show();
            isValid = false;
          }

          if (!isValid) return;

          const newUser = {
            name: name,
            email: email,
            password: password,
            active: true,
          };

          ajaxCall(
            "POST",
            "/api/users/register",
            JSON.stringify(newUser),
            function (result) {
              alert("Account created successfully! Please log in.");
              toggleForms("login");
            },
            function (err) {
              if (err.status === 409) {
                showServerError(
                  "This email is already registered in the system.",
                );
              } else {
                showServerError("Registration failed. Please try again.");
              }
            },
          );
        });

        $("#loginForm").on("submit", function (e) {
          e.preventDefault();
          $(".server-error").hide();

          const email = $("#loginEmail").val().trim();
          const password = $("#loginPassword").val();

          const loginData = {
            email: email,
            password: password,
          };

          ajaxCall(
            "POST",
            "/api/users/login",
            JSON.stringify(loginData),
            function (userResult) {
              localStorage.setItem("loggedInUser", userResult.name);
              // התוספת הקריטית: שמירת ה-ID של המשתמש!
              localStorage.setItem("loggedInUserId", userResult.id);

              window.location.href = "index.html";
            },
            function (err) {
              if (err.status === 404) {
                showServerError("Invalid email or password. User not found.");
              } else {
                showServerError("An error occurred while trying to log in.");
              }
            },
          );
        });
      });

      function showServerError(msg) {
        $("#serverError").text(msg).fadeIn();
      }
    </script>
  </body>
</html>
