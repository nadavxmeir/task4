<!doctype html>
<html lang="he">
  <head>
    <meta charset="UTF-8" />
    <title>My Library</title>
    <link rel="stylesheet" href="../CSS/style.css" />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="../Scripts/ajaxCalls.js"></script>
  </head>
  <body>
    <div class="header">
      <h1>My games</h1>
      <div class="main-menu">
        <a onclick="location.href = 'newGameForm.html'">Add / Edit game</a>
        <button
          class="dropdown-btn"
          style="width: auto; background: var(--accent-color)"
          onclick="location.href = 'index.html'"
        >
          back to store
        </button>
      </div>
    </div>

    <div class="search-bar">
      <input
        type="text"
        id="filterInput"
        placeholder="search game on your library..."
      />
    </div>

    <div id="library" class="games-grid"></div>

    <h2
      style="
        color: white;
        text-align: center;
        margin-top: 50px;
        text-decoration: underline;
      "
    >
      Recommended for you
    </h2>
    <div id="recommendations" class="games-grid"></div>

    <script>
      const loggedInUserId = localStorage.getItem("loggedInUserId");
      let myGamesList = []; // שמירה בזיכרון המקומי לצורך חיפוש מהיר בספרייה

      if (!loggedInUserId) {
        window.location.href = "auth.html";
      }

      $(document).ready(function () {
        fetchLibrary();

        // סינון מקומי - מחפש אך ורק במשחקים שכבר יש למשתמש
        $("#filterInput").on("input", function () {
          const val = $(this).val().trim().toLowerCase();
          if (val === "") {
            renderLibrary(myGamesList);
          } else {
            const filtered = myGamesList.filter((g) =>
              g.name.toLowerCase().includes(val),
            );
            renderLibrary(filtered);
          }
        });
      });

      function fetchLibrary() {
        // שליפת המשחקים של המשתמש בלבד!
        ajaxCall(
          "GET",
          `/api/Users/GetUserGames/${loggedInUserId}`,
          "",
          function (result) {
            myGamesList = result;
            renderLibrary(myGamesList);
            // לאחר טעינת הספרייה, נשלוף את ההמלצות
            fetchRecommendations();
          },
          error,
        );
      }

      function fetchRecommendations() {
        ajaxCall(
          "GET",
          `/api/Users/GetRecommendations/${loggedInUserId}`,
          "",
          renderRecommendations,
          error,
        );
      }

      function error(err) {
        console.error("שגיאה:", err);
      }

      function createGameCardHTML(g, isRecommendation = false) {
        let platformsHtml = "";
        if (g.windows)
          platformsHtml += `<span class="platform-tag">Windows</span>`;
        if (g.mac) platformsHtml += `<span class="platform-tag">Mac</span>`;
        if (g.linux) platformsHtml += `<span class="platform-tag">Linux</span>`;

        let tagsHtml = g.tags
          ? g.tags
              .slice(0, 3)
              .map((t) => `<span class="tag">${t}</span>`)
              .join("")
          : "";

        let buttonHtml = isRecommendation
          ? `<button class="btn btn-add" data-id="${g.id}" style="width: 100%;">Add to Collection</button>`
          : `<button class="btn btn-delete" data-id="${g.id}" style="width: 100%; background-color: #dc3545;">Remove from my library</button>`;

        return `
            <div class="game-card">
                <img src="${g.image}" alt="${g.name}" />
                <div class="card-content">
                    <h3>${g.name}</h3>
                    <div class="meta-info">
                        <span>Price: ${g.price === 0 ? "Free" : g.price + "$"}</span>
                        <span>Reviews: ${g.reviewSummary || "N/A"}</span>
                    </div>
                    <div class="platform-tags">${platformsHtml}</div>
                    <div class="tags">${tagsHtml}</div>
                    <div style="margin-top: 15px;">
                        ${buttonHtml}
                    </div>
                    <span style="font-size: 15px;  display: block; margin-top: 10px;">
                        Release date: ${formatDate(g.releaseDate)}
                    </span>
                </div>
            </div>`;
      }

      function renderLibrary(games) {
        const container = $("#library").empty();

        if (games.length === 0) {
          container.hide();
          if ($("#isEmpty").length === 0) {
            $("#filterInput").after(
              '<p id="isEmpty" style="color:white; text-align:center;">הספרייה שלך ריקה.</p>',
            );
          }
          return;
        } else {
          container.show();
          $("#isEmpty").remove();
        }

        games.forEach((g) => {
          const card = $(createGameCardHTML(g, false));
          card.find(".btn-delete").click(function () {
            const gameId = $(this).data("id");
            if (
              confirm(
                "האם אתה בטוח שברצונך להסיר את המשחק מהספרייה האישית שלך?",
              )
            ) {
              // הפניה לכתובת החדשה של UsersController שמוחקת רק את הקשר
              ajaxCall(
                "DELETE",
                `/api/Users/RemoveGameFromCollection?userId=${loggedInUserId}&gameId=${gameId}`,
                "",
                function (res) {
                  alert("✅ " + res); // ידפיס "המשחק הוסר מהאוסף שלך בהצלחה"
                  fetchLibrary();
                },
                function (err) {
                  alert("❌ מחיקה נכשלה: " + (err.responseText || "שגיאת שרת"));
                },
              );
            }
          });
          container.append(card);
        });
      }

      function renderRecommendations(games) {
        const container = $("#recommendations").empty();
        if (games.length === 0) {
          container.append(
            '<p style="color:white; text-align:center;">No recommendations available right now.</p>',
          );
          return;
        }

        games.forEach((g) => {
          const card = $(createGameCardHTML(g, true));
          card.find(".btn-add").click(function () {
            const gameId = $(this).data("id");
            ajaxCall(
              "POST",
              `/api/Users/AddGameToCollection?userId=${loggedInUserId}&gameId=${gameId}`,
              "",
              function () {
                alert("המשחק נוסף לאוסף שלך!");
                fetchLibrary(); // רענון הספרייה וההמלצות
              },
              function (err) {
                alert("אירעה שגיאה או שהמשחק כבר אצלך.");
              },
            );
          });
          container.append(card);
        });
      }
    </script>
  </body>
</html>
